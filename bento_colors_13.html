<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bento</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; background: #111; overflow: hidden; }

.outer {
  display: flex;
  width: 100vw; height: 100vh;
  padding: 10px; gap: 10px;
}

.sidebar {
  flex-shrink: 0;
  width: 44px;
  background: #222;
  border-radius: 14px;
}

.bento-grid {
  flex: 1;
  display: grid;
  gap: 8px;
  min-width: 0;
  height: 100%;
  transition:
    grid-template-columns 0.9s cubic-bezier(0.16, 1, 0.3, 1),
    grid-template-rows    0.9s cubic-bezier(0.16, 1, 0.3, 1);
}

.bc {
  border-radius: 14px;
  min-width: 0; min-height: 0;
  cursor: pointer;
  overflow: hidden;
  position: relative;
}

.bc > .bento-inner {
  position: absolute;
  inset: 8px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  border-radius: 8px;
  overflow: hidden;
}

.bc.active > .bento-inner {
  opacity: 1;
  pointer-events: all;
}

.bento-inner > .bento-grid {
  width: 100%;
  height: 100%;
  flex: none;
}
</style>
</head>
<body>
<div class="outer">
  <div class="sidebar"></div>
  <div class="bento-grid" id="root-grid"></div>
</div>
<script>
(function(){

const COLS = 24, ROWS = 12;
const EXPAND_COL = 0.9, EXPAND_ROW = 0.9;

const SPANS = [
  /* row 1-2 */
  {c:'1/4',   r:'1/2'}, {c:'4/6',   r:'1/2'}, {c:'6/7',   r:'1/2'},
  {c:'7/10',  r:'1/3'}, {c:'10/12', r:'1/2'}, {c:'12/14', r:'1/2'},
  {c:'14/15', r:'1/2'}, {c:'15/18', r:'1/2'}, {c:'18/20', r:'1/2'},
  {c:'20/22', r:'1/2'}, {c:'22/25', r:'1/2'},

  /* row 2 */
  {c:'1/3',   r:'2/3'}, {c:'3/5',   r:'2/3'}, {c:'5/7',   r:'2/4'},
  {c:'10/13', r:'2/3'}, {c:'13/15', r:'2/3'}, {c:'15/17', r:'2/3'},
  {c:'17/20', r:'2/4'}, {c:'20/22', r:'2/3'}, {c:'22/25', r:'2/3'},

  /* row 3-4 */
  {c:'1/4',   r:'3/5'}, {c:'4/6',   r:'3/4'}, {c:'6/7',   r:'3/5'},
  {c:'7/10',  r:'3/4'}, {c:'10/12', r:'3/5'}, {c:'12/15', r:'3/4'},
  {c:'15/17', r:'3/4'}, {c:'20/22', r:'3/4'}, {c:'22/25', r:'3/5'},

  /* row 4 */
  {c:'4/6',   r:'4/5'}, {c:'7/10',  r:'4/5'}, {c:'12/14', r:'4/5'},
  {c:'14/17', r:'4/6'}, {c:'15/17', r:'4/5'}, {c:'20/22', r:'4/5'},

  /* row 5-6 */
  {c:'1/3',   r:'5/7'}, {c:'3/5',   r:'5/6'}, {c:'5/7',   r:'5/6'},
  {c:'6/7',   r:'5/6'}, {c:'7/10',  r:'5/7'}, {c:'10/12', r:'5/6'},
  {c:'12/14', r:'5/6'}, {c:'17/20', r:'5/6'}, {c:'20/23', r:'5/7'},
  {c:'23/25', r:'5/6'},

  /* row 6 */
  {c:'3/5',   r:'6/7'}, {c:'5/7',   r:'6/7'}, {c:'10/12', r:'6/7'},
  {c:'12/15', r:'6/8'}, {c:'17/20', r:'6/7'}, {c:'23/25', r:'6/7'},

  /* row 7-8 */
  {c:'1/4',   r:'7/9'}, {c:'4/6',   r:'7/8'}, {c:'6/8',   r:'7/8'},
  {c:'8/10',  r:'7/9'}, {c:'10/12', r:'7/8'}, {c:'15/17', r:'7/8'},
  {c:'17/19', r:'7/9'}, {c:'19/21', r:'7/8'}, {c:'21/23', r:'7/8'},
  {c:'23/25', r:'7/9'},

  /* row 8 */
  {c:'4/6',   r:'8/9'}, {c:'6/8',   r:'8/9'}, {c:'10/12', r:'8/9'},
  {c:'15/17', r:'8/9'}, {c:'19/21', r:'8/9'}, {c:'21/23', r:'8/9'},

  /* row 9-10 */
  {c:'1/3',   r:'9/11'},{c:'3/5',   r:'9/10'},{c:'5/8',   r:'9/10'},
  {c:'8/10',  r:'9/10'},{c:'10/13', r:'9/11'},{c:'13/15', r:'9/10'},
  {c:'15/18', r:'9/10'},{c:'18/20', r:'9/11'},{c:'20/22', r:'9/10'},
  {c:'22/25', r:'9/10'},

  /* row 10 */
  {c:'3/5',   r:'10/11'},{c:'5/8',  r:'10/11'},{c:'8/10', r:'10/11'},
  {c:'13/15', r:'10/11'},{c:'15/18',r:'10/12'},{c:'20/22',r:'10/11'},
  {c:'22/25', r:'10/11'},

  /* row 11-12 */
  {c:'1/4',   r:'11/13'},{c:'4/7',  r:'11/12'},{c:'7/9',  r:'11/12'},
  {c:'9/11',  r:'11/13'},{c:'11/13',r:'11/12'},{c:'13/15',r:'11/12'},
  {c:'18/20', r:'11/12'},{c:'20/22',r:'11/13'},{c:'22/25',r:'11/12'},

  /* row 12 */
  {c:'4/7',   r:'12/13'},{c:'7/9',  r:'12/13'},{c:'11/13',r:'12/13'},
  {c:'13/15', r:'12/13'},{c:'18/20',r:'12/13'},{c:'22/25',r:'12/13'},
];

const COLORS = [
  '#FF0033','#FF8800','#FFE000','#00DD44','#00CCFF','#FF00BB','#8800FF',
  '#00EE66','#0055FF','#FF6600','#DD00FF','#FF0077','#FF2200','#FFCC00',
  '#00FF44','#0033FF','#00EEFF','#FF0044','#FF8800','#8800FF','#00DD44',
  '#FF00BB','#DD00FF','#FF6600','#0055FF','#FFE000','#00CCFF','#FF2200',
  '#00FF44','#FF0077','#FFCC00'
];

function parseCol(s){ const [a,b]=s.split('/').map(Number); return {cs:a,ce:b}; }
function parseRow(s){ const [a,b]=s.split('/').map(Number); return {rs:a,re:b}; }

function makeBento(gridEl, colorOffset) {
  const cells = [];

  SPANS.forEach((sp, i) => {
    const color = COLORS[(colorOffset + i) % COLORS.length];
    const {cs, ce} = parseCol(sp.c);
    const {rs, re} = parseRow(sp.r);

    const cell = document.createElement('div');
    cell.className = 'bc';
    cell.style.gridColumn = sp.c;
    cell.style.gridRow = sp.r;
    cell.style.background = color;

    const inner = document.createElement('div');
    inner.className = 'bento-inner';

    let innerMade = false;
    function ensureInner() {
      if (innerMade) return;
      innerMade = true;
      const innerGrid = document.createElement('div');
      innerGrid.className = 'bento-grid';
      inner.appendChild(innerGrid);
      makeBento(innerGrid, (colorOffset + i + 7) % COLORS.length);
    }

    cell.appendChild(inner);
    gridEl.appendChild(cell);
    cells.push({ el: cell, cs, ce, rs, re });

    cell.addEventListener('mouseenter', () => {
      ensureInner();
      setHover(cells.length - 1);
    });
  });

  let cur = null;
  let debounce = null;

  function applyTracks(idx) {
    const cw = new Array(COLS).fill(1);
    const rw = new Array(ROWS).fill(1);
    if (idx !== null) {
      const {cs, ce, rs, re} = cells[idx];
      const cSpan = ce - cs, rSpan = re - rs;
      const hovC = (COLS * EXPAND_COL) / cSpan;
      const hovR = (ROWS * EXPAND_ROW) / rSpan;
      const remC = (COLS - COLS * EXPAND_COL) / (COLS - cSpan);
      const remR = (ROWS - ROWS * EXPAND_ROW) / (ROWS - rSpan);
      for (let c = 0; c < COLS; c++) cw[c] = (c+1 >= cs && c+1 < ce) ? hovC : Math.max(0.02, remC);
      for (let r = 0; r < ROWS; r++) rw[r] = (r+1 >= rs && r+1 < re) ? hovR : Math.max(0.02, remR);
    }
    gridEl.style.gridTemplateColumns = cw.map(w => w.toFixed(4)+'fr').join(' ');
    gridEl.style.gridTemplateRows    = rw.map(w => w.toFixed(4)+'fr').join(' ');
  }
  applyTracks(null);

  function setHover(idx) {
    if (cur === idx) return;
    if (cur !== null) cells[cur].el.classList.remove('active');
    cur = idx;
    applyTracks(idx);
    if (idx !== null) cells[idx].el.classList.add('active');
  }

  // re-wire mouseenter now that cells array is complete
  cells.forEach(({el}, i) => {
    el.addEventListener('mouseenter', () => {
      clearTimeout(debounce);
      if (cur !== null && cur !== i) cells[cur].el.classList.remove('active');
      cur = i;
      applyTracks(i);
      cells[i].el.classList.add('active');
    });
  });

  gridEl.addEventListener('mouseleave', () => {
    debounce = setTimeout(() => {
      if (cur !== null) cells[cur].el.classList.remove('active');
      cur = null;
      applyTracks(null);
    }, 80);
  });

  gridEl.addEventListener('mouseenter', () => clearTimeout(debounce));
}

makeBento(document.getElementById('root-grid'), 0);

})();
</script>
</body>
</html>
